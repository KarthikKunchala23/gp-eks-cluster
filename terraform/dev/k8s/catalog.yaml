---
apiVersion: v1
kind: Pod
metadata:
  name: catalog-pod
  labels:
    app: catalog 
spec:
  containers:
  - name: catalog
    image: "public.ecr.aws/aws-containers/retail-store-sample-catalog:1.3.0"
    resources:
      limits:
        memory: "256Mi"
        cpu: "200m"
      requests:
        memory: "128Mi"
        cpu: "100m"
    ports:
      - name: http
        containerPort: 8080
        protocol: TCP
    readinessProbe: 
      httpGet:
        path: /health
        port: 8080
